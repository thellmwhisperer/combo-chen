# no-mistakes repo config for combo-chen. Local file, never committed
# (ignored via .git/info/exclude, same zero-footprint policy as roca-madre).
#
# commands run in the daemon's disposable worktree, which has no
# node_modules: each command self-provisions with a frozen-lockfile install
# (cheap after the first run, pnpm store cache).
agent: acp:hermes-deepseek

commands:
  test: pnpm install --frozen-lockfile --silent && pnpm test
  lint: pnpm install --frozen-lockfile --silent && pnpm typecheck
