# combo-chen configuration.
#
# Cascade: in-code defaults ← user config (~/.config/combo-chen/config.toml)
# ← repo config (combo-chen.toml, this file's sibling). Repo wins on policy,
# user wins on local setup. Copy this file and edit; the real config is
# gitignored by default.

[roles]
# The cast. Fixed roles, configurable agents.
coder = "codex"                   # implements; needs a [coder.<name>] command
# gatekeeper is ALWAYS the no-mistakes binary; WHICH MODEL runs the gate is
# chosen in the target repo's .no-mistakes.yaml (agent: codex | claude |
# acp:hermes-deepseek | ...). Non-interactive agents are fine there: the
# gate drives them headlessly through its own agent interface.
gatekeeper = "no-mistakes"
# reviewer runs post-PR. External checks/comments are configured separately below.
reviewer = ["claude"]              # validated: reviewer != coder
merge = "human"                   # hard default: earn automerge with data first

# Declare the expected effective identity per role. Each identity line pins
# binary → agent → model; the overture check resolves the actual identity from
# each tool's config (no-mistakes config, codex config.toml, opencode resolved
# config, etc.) and hard-fails on mismatch. Undeclared teams keep current
# behavior; the checklist notes the team is undeclared.
# Uncomment and tune for each role whose identity you want to pin.
# [team.coder]
# binary = "npx"
# agent = "gnhf/codex"
# model = "gpt-5.5"
#
# [team.gatekeeper]
# binary = "no-mistakes"
# agent = "claude"
# model = "opus"
#
# [team.reviewer]
# binary = "opencode"
# agent = "claude"
# model = "opus"
#
# [team.director]
# binary = "claude"
# agent = "claude"
# model = "opus"

[coder.codex]
# {placeholders}: issue_url, worktree, repo, branch, prompt. Each value is
# substituted as a single-quoted shell token; don't add quotes around them.
# For plan-backed combos, {issue_url} is empty and the prompt is derived
# from the work-plan artifact.
# Omit command/resume_command to use combo-chen's safe built-in codex/gnhf defaults:
# coder command: pinned gnhf runs `--agent codex` with max-iteration,
# stop-condition, sleep-prevention, and low-noise telemetry flags.
# resume command: codex resume {thread_id}
# gnhf 0.1.41 does not expose a Codex profile/flag pass-through for the
# coder path, so Codex terminal/profile flags belong in resume_command or a
# repo-owned wrapper.
# Override only when this repo owns a custom coder wrapper:
# command = 'repo-coder --current-branch {prompt}'
# {placeholders}: thread_id. Used by coder responding mode to resume the same
# implementation context after PR review comments land.
# resume_command = 'codex --profile sitter --no-alt-screen resume {thread_id}'
# combo-chen always appends a surface preflight to every coder prompt:
# the coder is instructed to run `pnpm surface` before writing any new
# helper and reuse existing exports instead of duplicating them.

# A hermes example (DeepSeek/Gemini/... via the Hermes harness):
# [coder."hermes:deepseek"]
# command = 'hermes -z {prompt}'
# resume_command = 'hermes --resume {thread_id}'

[gatekeeper]
# Before this command runs, combo-chen publishes local HEAD to the
# no-mistakes mirror with a base64-encoded `no-mistakes.intent=` git push
# option. For issue-backed combos the intent includes a PR body requirement
# to preserve `Fixes #N` so GitHub closes the source issue when the PR is
# merged. For plan-backed combos the intent describes the work-plan source
# and completed acceptance criteria, with no autoclose keywords.
# Override this to use a custom gatekeeper pipeline.
# {placeholders}: issue_url, issue_title, issue_body, issue_pr_intent,
# branch. Each value is substituted as a single-quoted shell token; don't
# add quotes around them. Unknown placeholders cause run to fail with a
# config error. Custom issue-closing PR commands should pass
# {issue_pr_intent} or another explicit GitHub autoclose keyword.
# For plan-backed combos, only {issue_pr_intent} and {branch} are valid;
# {issue_url}, {issue_title}, and {issue_body} cause a config error.
# Example with placeholders:
# command = "no-mistakes axi run --yes --intent {issue_pr_intent}"
command = "no-mistakes daemon start && no-mistakes axi run --intent {issue_pr_intent}"
# Generated gate scripts may start or verify the shared no-mistakes daemon
# before publishing to the mirror, but they never stop it on exit. The daemon
# is left running for both single-capsule and parallel wave runs.
# The gatekeeper tmux window retries until no-mistakes has an active run to attach.
# Environment overrides: COMBO_CHEN_GATEKEEPER_ATTACH_TIMEOUT_SECONDS,
# COMBO_CHEN_GATEKEEPER_ATTACH_RETRY_INTERVAL_SECONDS.
attach_timeout_seconds = 1800
attach_retry_interval_seconds = 10
# When the initial pre-PR gate fails, the director auto-relaunches it up to
# this many times. After the limit is exhausted the combo journals
# needs_human reason=gate_failed and stops relaunching.
# Environment override: COMBO_CHEN_GATEKEEPER_INITIAL_GATE_RETRY_ATTEMPTS.
initial_gate_retry_attempts = 2
# Seconds to wait before each automatic initial-gate retry.
# Environment override: COMBO_CHEN_GATEKEEPER_INITIAL_GATE_RETRY_BACKOFF_SECONDS.
initial_gate_retry_backoff_seconds = 10

# Every generated gate script acquires a shared no-mistakes gate lease before
# running the gate and releases it on EXIT via a trap. This serializes
# publication across parallel capsules under the wave-based scaling model
# (start 2, then 3, then 4-6). When another capsule holds the lease, the
# script journals gate_status queued and exits 0. When the same branch is
# already owned by a different capsule, it journals
# needs_human reason=gate_lease_conflict and exits 76. Stale leases
# (heartbeat older than 30 minutes) are automatically recovered. This is
# always-on and not configurable; it prevents parallel capsules from colliding
# on the single no-mistakes daemon.

[director]
# Promptable interactive director window, created at launch. It does not poll;
# director-watch does deterministic polling and prompts this window only when
# ambiguity, malformed signals, intent-touching choices, or uncoded recovery
# need judgment. Also the persistent prompt target for reviewer verdict code 2;
# this is distinct from director-watch, which is the deterministic polling loop
# and is not promptable.
# Environment override: COMBO_CHEN_DIRECTOR_COMMAND.
# {placeholders}: issue_url, worktree, repo, branch, prompt.
command = "claude {prompt}"

[review]
# v1 local pre-publish review loop (verdict -> coder fix turn -> re-review).
# max_rounds is the round-cap backstop; the no-progress guard (same finding
# fingerprint surviving two consecutive rounds, or a no-op coder fix turn)
# usually escalates needs_human first. Snapshot-frozen per run.
# Environment override: COMBO_CHEN_REVIEW_MAX_ROUNDS.
max_rounds = 3
# Wall-clock bounds for the loop's owned agent turns: a reviewer or coder fix
# child that outlives its bound is terminated and the loop escalates
# needs_human instead of waiting forever. verdict_wait_ms bounds how long the
# capsule waits for the verdict artifact after the reviewer exits.
# Environment overrides: COMBO_CHEN_REVIEW_REVIEWER_TURN_TIMEOUT_MINUTES,
# COMBO_CHEN_REVIEW_FIX_TURN_TIMEOUT_MINUTES, COMBO_CHEN_REVIEW_VERDICT_WAIT_MS.
reviewer_turn_timeout_minutes = 60
fix_turn_timeout_minutes = 120
verdict_wait_ms = 5000

[ready]
# Required READY checks are GitHub status contexts/check runs, not reviewer
# approval. Each configured name must be present with exact SUCCESS; all other
# checks in the PR rollup must also be green.
# Environment override: COMBO_CHEN_READY_REQUIRED_CHECKS.
# This repo dogfoods CodeRabbit as the required external reviewer. If a target
# repo uses another external reviewer, replace the names in [ready],
# [external_review], [pr_labels], and [external_comments] together.
required_checks = ["CodeRabbit"]

[external_review]
# Commands posted as PR comments after the active reviewer emits a current-head
# LGTM, used to trigger external review systems whose SUCCESS checks are listed
# in [ready]. Each command is posted once per head SHA.
# Environment override: COMBO_CHEN_EXTERNAL_REVIEW_COMMANDS.
commands = ["@coderabbitai review"]

[pr_labels]
# Check names that satisfy the combo:external-review-green PR label.
# Environment override: COMBO_CHEN_PR_LABEL_GREEN_CHECK_NAMES.
green_check_names = ["CodeRabbit"]

[coder_responding]
# Defaults to the persistent coder role window. Set this to a separate window
# name such as "coder-responding" only for historical/adopted capsules that
# still need the compatibility bridge.
window_name = "coder"
# {placeholders}: author, kind, url.
review_nudge_prompt = '''
New review comment for coder responding mode:
{url}

Use the two-bucket contract: handle mechanical fixes autonomously with TDD, code, and committed local changes; escalate intent-touching decisions with needs_human before changing code.
Do not push to origin or the PR branch. Leave committed local changes for gatekeeper/no-mistakes to validate and publish.
'''

[external_comments]
# External comment agents are matched by review/comment author for noise
# filtering and coder routing. They do not approve PRs or satisfy READY checks.
# Environment override: COMBO_CHEN_EXTERNAL_COMMENT_AGENTS.
agents = ["coderabbitai"]

[reviewer]
# Free-form reviewer instructions passed into the generated prompt. Keep this
# generic; put any personal/local review process in your own local config.
# Reviewer submit commands must be one plain command, normally:
# gh pr review <url> --comment --body "<body>"
# Do not use temp files, cat, rm, pipes, redirection, semicolons, &&, or ||.
# prompt = "Apply my local review process."
# GitHub logins allowed to satisfy the SHA-pinned reviewer LGTM gate and whose
# machine-readable verdict blocks are accepted for routing. Defaults
# to the active reviewer agent name; set this when the GitHub author differs.
# Environment override: COMBO_CHEN_REVIEWER_LOGINS.
logins = ["claude"]
# The generated reviewer prompt always includes anti-slop guardrails:
# - verify `pnpm surface` was consulted for new helpers (route code 1 for dupes)
# - route code 1 for config without who/when/why, or compat paths without
#   a removal issue/date
# - flag script/runner string assertions that should be contract tests
# - treat many new top-level exports as a surface budget breach unless justified

[reviewer.claude]
# {placeholders}: issue_url, pr_url, worktree, repo, branch, prompt.
command = "claude {prompt}"

[monitor]
# Environment overrides: COMBO_CHEN_WORKER_STALL_TICKS,
# COMBO_CHEN_WORKER_RECOVERY_ATTEMPTS,
# COMBO_CHEN_WORKER_PERMISSION_PROMPT_PATTERNS,
# COMBO_CHEN_WORKER_PERMISSION_PROMPT_POLICY,
# COMBO_CHEN_CODER_GNHF_PROGRESS_MAX_AGE_MS,
# COMBO_CHEN_GATEKEEPER_STATUS_TIMEOUT_MS.
worker_stall_ticks = 3
# Stalled or permission-prompted coder-responding workers are recreated and
# re-prompted this many times before needs_human is journaled.
worker_recovery_attempts = 2
# Max age of the most-recent gnhf.log mtime (ms) before a coder pane is
# considered unlikely to be actively progressing.
coder_gnhf_progress_max_age_ms = 600000
# Timeout for probing no-mistakes to check gatekeeper orchestrator evidence (ms).
gatekeeper_status_timeout_ms = 5000
permission_prompt_policy = "escalate" # one of: escalate, auto-approve-known-safe, recreate-non-interactive
permission_prompt_patterns = [
  '^\s*Do you want to (?:proceed|continue)\?\s*(?:\[[yn]/[yn]\])?\s*$',
  '^\s*(?:Allow|Approve|Confirm)\?\s*\[[yn]/[yn]\]\s*$',
  '^\s*(?:Press|Type)\s+(?:y|yes)\s+to\s+(?:continue|proceed|confirm)\.?\s*$',
]

[run]
# Source checkout branch required before `combo-chen run`.
# Environment override: COMBO_CHEN_SOURCE_BRANCH.
source_branch = "main"

[limits]
babysit_poll_seconds = 120  # director-watch poll interval
watch_failure_limit = 5     # consecutive director-watch tick failures before visible death
watch_backoff_max_seconds = 3600 # cap for director-watch failure backoff
coder_timeout_minutes = 180
teardown_git_retries = 2          # retries for git worktree/branch teardown operations
teardown_git_backoff_seconds = 2  # backoff between teardown retries
