# combo-chen configuration.
#
# Cascade: in-code defaults ← user config (~/.config/combo-chen/config.toml)
# ← repo config (combo-chen.toml, this file's sibling). Repo wins on policy,
# user wins on local setup. Copy this file and edit; the real config is
# gitignored by default.

[roles]
# The cast. Fixed roles, configurable agents.
coder = "codex"                   # implements; needs a [coder.<name>] command
# gatekeeper is ALWAYS the no-mistakes binary; WHICH MODEL runs the gate is
# chosen in the target repo's .no-mistakes.yaml (agent: codex | claude |
# acp:hermes-deepseek | ...). Non-interactive agents are fine there: the
# gate drives them headlessly through its own agent interface.
gatekeeper = "no-mistakes"
# reviewer runs post-PR. Ambient reviewer checks are configured below.
reviewer = ["claude"]              # validated: reviewer != coder
merge = "human"                   # hard default: earn automerge with data first

[coder.codex]
# {placeholders}: issue_url, worktree, repo, branch, prompt. Each value is
# substituted as a single-quoted shell token; don't add quotes around them.
# Omit command/resume_command to use combo-chen's safe built-in codex/gnhf defaults.
# Override only when this repo owns a custom coder wrapper:
# command = 'repo-coder --current-branch {prompt}'
# {placeholders}: thread_id. Used by coder responding mode to resume the same
# implementation context after PR review comments land.
# resume_command = 'repo-coder resume {thread_id}'

# A hermes example (DeepSeek/Gemini/... via the Hermes harness):
# [coder."hermes:deepseek"]
# command = 'hermes -z {prompt}'
# resume_command = 'hermes --resume {thread_id}'

[gatekeeper]
# Before this command runs, combo-chen publishes local HEAD to the
# no-mistakes mirror with a base64-encoded `no-mistakes.intent=` git push
# option. The command then starts the daemon and drives the gate with the full
# issue-derived intent ending in `Fixes #N` so GitHub closes the source issue
# when the PR is merged.
# Override this to use a custom gatekeeper pipeline.
# {placeholders}: issue_url, issue_title, issue_body, issue_pr_intent,
# branch. Each value is substituted as a single-quoted shell token; don't
# add quotes around them. Unknown placeholders cause run to fail with a
# config error. Custom issue-closing PR commands should pass
# {issue_pr_intent} or another explicit GitHub autoclose keyword.
# Example with placeholders:
# command = "no-mistakes axi run --yes --intent {issue_pr_intent}"
command = "no-mistakes daemon start && no-mistakes axi run --intent {issue_pr_intent}"
# The gatekeeper tmux window retries until no-mistakes has an active run to attach.
# Environment overrides: COMBO_CHEN_GATEKEEPER_ATTACH_TIMEOUT_SECONDS,
# COMBO_CHEN_GATEKEEPER_ATTACH_RETRY_INTERVAL_SECONDS.
attach_timeout_seconds = 1800
attach_retry_interval_seconds = 10

[coder_responding]
window_name = "coder-responding"
# {placeholders}: author, kind, url.
review_nudge_prompt = '''
New review comment for coder responding mode:
{url}

Use the two-bucket contract: handle mechanical fixes autonomously with TDD, code, and committed local changes; escalate intent-touching decisions with needs_human before changing code.
Do not push to origin or the PR branch. Leave committed local changes for gatekeeper/no-mistakes to validate and publish.
'''

[reviewer]
# Protocol content stays in config. Keep this as a reference to your current
# repository review protocol and project overlay rather than copying them here.
protocol = "repository review protocol + project overlay"
# Ambient review/check providers are matched by status context/check name and
# review author. They do not run in the reviewer tmux window.
ambient = ["coderabbit"]

[reviewer.claude]
# {placeholders}: issue_url, pr_url, worktree, repo, branch, protocol, prompt.
command = "claude {prompt}"

[limits]
babysit_poll_seconds = 120  # director-watch poll interval
watch_failure_limit = 5     # consecutive director-watch tick failures before visible death
watch_backoff_max_seconds = 3600 # cap for director-watch failure backoff
coder_timeout_minutes = 180
teardown_git_retries = 2          # retries for git worktree/branch teardown operations
teardown_git_backoff_seconds = 2  # backoff between teardown retries
