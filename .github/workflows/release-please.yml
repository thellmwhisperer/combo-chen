name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Enable auto-merge for release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          RELEASE_PR_NUMBER: ${{ fromJSON(steps.release.outputs.pr).number }}
        run: gh pr merge --merge --auto "$RELEASE_PR_NUMBER"

      # npm publish lands together with the OSS flip: the package is not on
      # the registry while this repo is private. Releases + changelog work now.
