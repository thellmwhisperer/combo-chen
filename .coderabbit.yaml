# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit config for combo-chen.
#
# Rationale (La Roca memory #9333): historical analysis of the 16 PRs where
# CodeRabbit was active showed it caught real bugs (shell injection, prototype
# bypass, numeric precision loss, orphaned reviewer windows) that the gate,
# Gordon reviewer, and TDD coder all missed. ~40% of comments were Critical/Major
# (value), ~24% were Minor nits (markdown/style, zero bugs caught).
#
# Design principle: do NOT use tone_instructions or path_instructions to filter
# findings. Instructing the model to "stay silent unless X" risks missing novel
# bug classes. Keep profile assertive (max recall) and prune only deterministic
# cosmetic noise + tools that produced no value.
language: "en-US"

reviews:
  profile: "assertive"
  request_changes_workflow: false
  fail_commit_status: false

  high_level_summary: true
  collapse_walkthrough: true
  changed_files_summary: false
  sequence_diagrams: false
  estimate_code_review_effort: false
  assess_linked_issues: true
  related_issues: false
  related_prs: false
  suggested_labels: false
  suggested_reviewers: false
  poem: false
  in_progress_fortune: false
  enable_prompt_for_ai_agents: false

  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true
    ignore_title_keywords:
      - "chore(main): release"

  tools:
    shellcheck:
      enabled: true
    ast-grep:
      essential_rules: false
    markdownlint:
      enabled: false
    languagetool:
      enabled: false

chat:
  auto_reply: true
