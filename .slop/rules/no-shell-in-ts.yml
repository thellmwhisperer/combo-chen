# Guard against inline shell code in TypeScript. The v0 shell template system
# is retired; generated shell no longer lives in TS strings. This rule fires
# on sed, case, while, trap, grep pipe, and printf-substitution patterns
# embedded in TypeScript — any new shell in TS must justify itself.
id: no-shell-in-ts
language: TypeScript
files:
  - "src/**"
ignores:
  - "**/*.test.ts"
rule:
  kind: string
  regex: "sed -n |while \\[ |\\| grep -|trap '|\\$\\(printf |no_mistakes_axi_field"
message: shell construct inside a TS string literal; inline shell was retired in v1
severity: error
