# Tombstones for helpers that were duplicated across modules and consolidated.
# Cite: PR #247 reintroduced a private errorMessage in src/cli/main.ts while
# six copies already existed; isRecord had 5 copies, isErrnoException 2, and
# latestPrUrl 3 variants. yesNo lived privately in src/app/reporting/forensics.ts and
# was about to grow a second copy in director-watch-status. Canonical homes:
# src/core/guards.ts (errorMessage, isRecord, isErrnoException),
# src/core/events.ts (latestPrUrlFromEvents), src/app/reporting/display.ts (yesNo).
# Covers function declarations plus const/let arrow-function and
# function-expression forms so the easy bypasses fail too.
id: no-duplicate-helpers
language: TypeScript
files:
  - "src/**"
ignores:
  - "src/core/guards.ts"
  - "src/core/events.ts"
  - "src/app/reporting/display.ts"
rule:
  any:
    - kind: function_declaration
      has:
        field: name
        regex: ^(errorMessage|isRecord|isErrnoException|latestPrUrl|latestPrUrlFromEvents|yesNo)$
    - kind: variable_declarator
      all:
        - has:
            field: name
            regex: ^(errorMessage|isRecord|isErrnoException|latestPrUrl|latestPrUrlFromEvents|yesNo)$
        - has:
            field: value
            any:
              - kind: arrow_function
              - kind: function_expression
message: duplicated helper; import errorMessage/isRecord/isErrnoException from src/core/guards.ts, latestPrUrlFromEvents from src/core/events.ts, or yesNo from src/app/reporting/display.ts
severity: error
