# Pending burial: 82 script/runner toContain assertions remain after #283
# (the extraction migrated the ones its templates broke to executed-script
# contract tests, e.g. gate.test.ts attachHarness and watchers.test.ts).
# Stays a warning until the stock reaches zero, then it becomes error.
id: script-string-assertion
language: TypeScript
files:
  - "src/**/*.test.ts"
rule:
  pattern: expect($TARGET).toContain($VALUE)
constraints:
  TARGET:
    regex: "^(script|runner)$"
message: script/runner toContain assertions freeze internal strings; prefer contract behavior
severity: warning
