# Pending burial: ~80 script/runner toContain assertions remain; stays a
# warning until tests assert contract behavior, then it becomes error.
id: script-string-assertion
language: TypeScript
files:
  - "src/**/*.test.ts"
rule:
  pattern: expect($TARGET).toContain($VALUE)
constraints:
  TARGET:
    regex: "^(script|runner)$"
message: script/runner toContain assertions freeze internal strings; prefer contract behavior
severity: warning
