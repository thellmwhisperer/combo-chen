# Buried with #284: callers outside src/update use the declared module entry
# point, so update internals can move without leaking their file layout.
id: update-boundary
language: TypeScript
files:
  - "src/**/*.ts"
  - "e2e/**/*.ts"
ignores:
  - "src/update/**"
rule:
  all:
    - kind: string
    - regex: "(?:\\.\\./)+(?:src/)?update/"
    - not:
        regex: "(?:\\.\\./)+(?:src/)?update/index(?:\\.js)?"
    - inside:
        any:
          - kind: import_statement
          - kind: export_statement
message: callers outside src/update must import its declared entry point (update/index)
severity: error
