# Buried 2026-07-09 (#283, prune train #286): the shell embedded in
# src/core/combo.ts moved to src/shell/templates and the stock reached zero,
# so this rule is promoted from warning to error. core/ stays free of
# shell/git/tmux verbs in string literals.
id: core-no-infra-verbs
language: TypeScript
files:
  - "src/core/**"
ignores:
  - "**/*.test.ts"
rule:
  kind: string
  regex: "no-mistakes|git push|tmux |\\.sh\\b"
message: core/ references infra verbs; move shell/git/tmux execution to cli/, roles/, infra/, or src/shell templates
severity: error
