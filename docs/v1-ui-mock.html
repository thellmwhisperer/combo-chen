<!--
  combo-chen v1 · navigable UI mock (design contract)
  Spec: docs/v1-prd.md §8 Terminal UI. This mock is the visual reference; the
  PRD is the implementation contract. Where they differ, the PRD §8 text wins.

  Frozen design rules (session 2026-07-12):
  - Everything renders by folding fake journal.jsonl events; the renderer holds
    no state a run dir could not provide. Same substrate rule as the real TUI.
  - NO progress bars for agent work: it has no known end. Activity is a
    count-up timer (mm:ss) + braille spinner. Medians appear as text, never
    as a bar scale.
  - Steps only where real steps exist (gate: review/test/lint) rendered as
    per-step checkmarks, not a filling bar.
  - Numbers never appear bare: every count carries a verb or label
    ("2 fixes rejected", "1 finding open"). No cryptic trends like 1-1-1.
  - Fleet REVIEW row = live actor + round, nothing else. Detail lives in the
    dive-in thread.
  - Review loop reads as a rally: two stations, travelling dot toward whoever
    receives the ball; bounded at 3 rounds, then the director escalates.
  - Spatial navigation: Enter/ArrowRight dives in, ArrowLeft/Escape/q backs out.
  - Escalation language is cause-and-effect ("3 fixes rejected, X still open"),
    not reviewer jargon ("survived").
-->

/* ---------- fold functions: state is always derived, never stored ---------- */
function lastOf(j, k) { for (let i = j.length - 1; i >= 0; i--) if (j[i].k === k) return j[i]; return null; }
function fold(c) {
  const j = c.journal;
  const last = j[j.length - 1];
  const verdicts = j.filter(e => e.k === "verdict");
  const findingsTrend = verdicts.map(v => v.findings.length);
  const train = j.filter(e => ["verdict","coder_turn","coder_live","reviewer_live"].includes(e.k))
    .map(e => e.k === "verdict" ? "V" + e.n : e.k === "coder_turn" ? "C" + e.n : (e.k === "coder_live" ? "C" + e.n + "◌" : "V" + e.n + "◌"));
  let phase = "CODER", glyph = "▶", cls = "g", state = "";
  if (c.closed) { phase = "CLOSED"; glyph = "✓"; cls = "d"; state = lastOf(j,"closed").sum.pr; }
  else if (last.k === "parked") { phase = "PARKED"; glyph = "■"; cls = "d"; state = "resumable"; }
  else if (last.k === "escalated") { phase = "NEEDS YOU"; glyph = "⚑"; cls = "r"; state = "escalated"; }
  else if (last.k === "ready") { phase = "READY"; glyph = "✓"; cls = "g"; state = "merge when ok"; }
  else if (last.k === "coderabbit" || last.k === "gate_done") { phase = "PR"; glyph = "▶"; cls = "a"; state = last.k === "gate_done" ? "CodeRabbit reviewing" : "checks settling"; }
  else if (last.k === "gate_started" || last.k === "gate_step") {
    phase = "GATE"; glyph = "▶"; cls = "a";
    const steps = j.filter(e => e.k === "gate_step").map(e => e.step);
    state = ["review","test","lint"].map(s => s + (steps.includes(s) ? " ✓" : steps[steps.length-1] === s ? " ●" : "")).join(" · ");
    state = "run: " + (steps.length ? steps[steps.length-1] + " ✓, next…" : "starting");
  }
  else if (last.k === "coder_live") { phase = "REVIEW"; glyph = "▶"; cls = "a"; state = "coder fixing"; }
  else if (last.k === "reviewer_live") { phase = "REVIEW"; glyph = "▶"; cls = "a"; state = "reviewer judging"; }
  else if (last.k === "verdict") { phase = "REVIEW"; glyph = "▶"; cls = "a"; state = "verdict " + (last.code === 0 ? "0 · to gate" : last.code); }
  else if (last.k === "gnhf_live") { phase = "CODER"; glyph = "▶"; cls = "g"; state = "gnhf loop"; }
  else if (last.k === "coder_done") { phase = "REVIEW"; glyph = "▶"; cls = "a"; state = "awaiting V0"; }
  let round = verdicts.length ? verdicts[verdicts.length - 1].n : 0;
  if ((last.k === "coder_live" || last.k === "reviewer_live") && last.n != null) round = last.n;
  const needsYou = last.k === "escalated";
  const ageM = Math.round((Date.now() - c.created) / min);
  const lastM = Math.round((Date.now() - last.t) / min);
  return { phase, glyph, cls, state, round, needsYou, findingsTrend, train, last, ageM, lastM };
}
function fmtAge(m) { return m >= 60 ? (m/60).toFixed(1) + "h" : m + "m"; }
function mmss(ms) { const s = Math.max(0, Math.floor(ms/1000)); return String(Math.floor(s/60)).padStart(2,"0") + ":" + String(s%60).padStart(2,"0"); }
/* determinate progress bars are banned in this UI: agent work has no known end.
   activity = count-up timer + spinner · steps (gate) = per-step checkmarks */
/* travelling dot along a dotted lane; direction = who receives the ball next */
function dotcontent(f, cells, cls, rtl) {
  let pos = Math.min(cells - 1, Math.floor(f * cells));
  if (rtl) pos = cells - 1 - pos;
  let s = "";
  for (let i = 0; i < cells; i++) s += i === pos ? `<span class="${cls}">●</span>` : `<span class="f">·</span>`;
  return s;
}
function flightline(startMs, durMs, cells, cls, rtl) {
  let f = (((Date.now() - startMs) / durMs) % 1 + 1) % 1;
  return `<span class="livebar" data-mode="dot" data-start="${startMs}" data-dur="${durMs}" data-cells="${cells}" data-cls="${cls}" data-cyc="1" data-dir="${rtl?"rtl":"ltr"}">${dotcontent(f, cells, cls, rtl)}</span>`;
}

/* ---------- app state (navigation only) ---------- */
const S = { screen: "fleet", tab: "live", sel: 0, capsule: null, modal: null, decided: {} };
const $head = document.getElementById("head"), $body = document.getElementById("body"),
      $foot = document.getElementById("foot"), $mbg = document.getElementById("modal-bg"),
      $modal = document.getElementById("modal");

function fleetList() {
  const all = Object.values(capsules);
  if (S.tab === "parked") return all.filter(c => !c.closed && fold(c).phase === "PARKED");
  if (S.tab === "closed") return all.filter(c => c.closed);
  return all.filter(c => !c.closed && fold(c).phase !== "PARKED")
    .sort((a, b) => {
      const fa = fold(a), fb = fold(b);
      const w = f => f.needsYou ? 0 : f.phase === "READY" ? 1 : 2;
      return w(fa) - w(fb);
    });
}

/* ---------- renderers ---------- */
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;"); }

function renderFleet() {
  const list = fleetList();
  const live = Object.values(capsules).filter(c => !c.closed && fold(c).phase !== "PARKED").length;
  const needs = Object.values(capsules).filter(c => !c.closed && fold(c).needsYou).length;
  $head.innerHTML = `<span class="l"><span class="v">combo-chen</span> <span class="d">·</span> fleet ${needs ? '<span class="r">● ' + needs + " needs you</span>" : '<span class="g">● all quiet</span>'}</span><span class="d">${hhmm(Date.now())}</span>`;
  let h = `<div class="tabs">
    <span class="${S.tab==="live"?"on":""}" data-tab="live">[1] live</span>
    <span class="${S.tab==="parked"?"on":""}" data-tab="parked">[2] parked</span>
    <span class="${S.tab==="closed"?"on":""}" data-tab="closed">[3] closed</span></div>`;
  if (!list.length) {
    h += `<div class="empty"><div class="big">Nothing here. Nothing needs you.</div><div>[n] launch a combo · [1] live combos</div></div>`;
    $body.innerHTML = h; $foot.innerHTML = footFleet(); return;
  }
  list.forEach((c, i) => {
    const f = fold(c);
    const selCls = i === S.sel ? "row sel" : "row";
    let det = "";
    if (c.closed) { const s = lastOf(c.journal,"closed").sum;
      det = `${s.pr} · ${s.rounds} rounds · ${s.dur} · ${s.findings}`;
    } else if (f.needsYou) {
      det = `<span class="r">› ${esc(f.last.reason)}</span> · (v) card`;
    } else if (f.phase === "CODER") {
      const g = lastOf(c.journal, "gnhf_live");
      if (g) { const iterDur = 2600, it = 1 + (Math.floor((Date.now()-g.t)/iterDur) % (g.maxIter-1));
        det = `gnhf loop <span class="spin g">⠋</span> <span class="d">iter ${it}/${g.maxIter} · ${g.on}</span>`;
      } else det = "coder working";
    } else if (f.phase === "REVIEW") {
      const rev = f.last.k === "reviewer_live", live = rev || f.last.k === "coder_live";
      const who = live ? `<span class="${rev ? "v" : "g"}">${esc(f.state)}</span> <span class="spin ${rev ? "v" : "g"}">⠋</span>` : esc(f.state);
      det = `${who} · <span class="d">round ${f.round}</span>`;
    } else if (f.phase === "GATE") {
      const order = ["review","test","lint"];
      const steps = c.journal.filter(e=>e.k==="gate_step").map(e=>e.step);
      const cur = order.find(s => !steps.includes(s));
      det = `no-mistakes · ${order.map(s => steps.includes(s) ? `<span class="g">${s} ✓</span>` : s === cur ? `<span class="a">${s} <span class="spin a">⠋</span></span>` : `<span class="f">${s}</span>`).join(" · ")}`;

/* review loop as a rally: two stations, ball in flight, turn bar fills in REAL seconds */
function reviewRallyHtml(c, f) {
  const live = f.last;
  const rev = live.k === "reviewer_live";
  const round = live.n != null ? live.n : f.round;
  const aCls = rev ? "v" : "g";
  const dur = live.dur || (rev ? 3200 : 4200);
  const el = Date.now() - live.t;
  const lastV = [...c.journal].reverse().find(e => e.k === "verdict");
  const trend = c.journal.filter(e => e.k === "verdict").map(v => v.findings.length);

  const coderSt = !rev
    ? `<span class="g">● coder</span> <span class="d">C${round} fixing <span class="spin g">⠋</span></span>`
    : `<span class="f">○ coder</span> <span class="f">reworked</span>`;
  const revSt = rev
    ? `<span class="d">judging V${round} <span class="spin v">⠋</span></span> <span class="v">reviewer ●</span>`
    : `<span class="f">queued</span> <span class="f">reviewer ○</span>`;
  const flight = flightline(live.t, 1400, 9, aCls, rev);
  const note = !rev
    ? `editing guards.ts · fixing “${lastV ? esc(lastV.findings[0].txt) : "open finding"}”`
    : `re-checking guards.ts · attack surface ${Math.min(4, 1 + Math.floor((el / dur) * 4))}/4`;

  let h = `<div class="sum-box">
    <div class="rally-head"><span><span class="v">review rally</span> · round <span class="v">${round}</span> · <span class="a">not converging</span></span>
      <span class="d">this turn <span class="${aCls}">${mmss(el)}</span></span></div>
    <div class="rally-lane"><span class="st">${coderSt}</span><span class="flight">${flight}</span><span class="st">${revSt}</span></div>
    <div class="subline">${note}</div>
  </div>`;

  if (lastV && lastV.findings.length) {
    h += `<div class="crumb" style="margin:2px 0 4px"><span class="d">still open after V${lastV.n}:</span></div>`;
    lastV.findings.forEach(fi => {
      h += `<div class="finding"><span class="${fi.sev === "major" ? "r" : "d"}">${fi.sev}</span>  <span class="d">${fi.loc}</span>  ${esc(fi.txt)}</div>`;
    });
  }

  const left = Math.max(0, 3 - round), attempts = Math.max(0, trend.length - 1);
  const hist = attempts === 0
    ? "flagged by the reviewer in V0 · first fix attempt in progress"
    : `the coder tried <span class="a">${attempts} fix${attempts === 1 ? "" : "es"}</span>, the reviewer rejected each one`;
  h += `<div class="ledger subline">${hist} · ${left > 0 ? left + (left === 1 ? " round" : " rounds") + " left before the director hands it to you" : "final round · if this fix is rejected too, it lands on your desk"}</div>`;
  h += `<div class="next" style="padding-left:0">next: ${projection(c, f)}</div>`;
  return h;
}

function entryHtml(e, c) {

function projection(c, f) {
  const l = f.last;
  if (l.k === "gnhf_live") return "coder loop converges → coder_done → first review V0";
  if (l.k === "coder_live") return c.loop === "review"
    ? `reviewer re-reviews the fix → verdict V${l.n} · no approval yet in ${f.round} rounds`
    : `verdict V${l.n} · ~8m by this combo's median`;
  if (l.k === "reviewer_live") return c.loop === "review"
    ? "if the reviewer rejects this fix too, the director hands it to you"
    : `verdict V${l.n} in a few minutes`;
  if (l.k === "gate_step" || l.k === "gate_started") return "gate finishes · PR opens";
  if (l.k === "gate_done") return "CodeRabbit auto-review on push";
  if (l.k === "ready") return "nothing · waiting for your merge";
  if (l.k === "escalated") return "nothing until you decide (v)";
  return null;
}

function armScript(c) {
  if (!c.script.length) return;
  const step = c.script.shift();
  setTimeout(() => {
    // replace a live entry with its resolution when the next concrete event lands
    if (step.ev.k === "coder_turn" || step.ev.k === "verdict") {
      const li = c.journal.findIndex(e => e.k === "coder_live" || e.k === "reviewer_live");
      if (li >= 0 && (step.ev.k === "coder_turn" || step.ev.k === "verdict")) c.journal.splice(li, 1);
    }
    c.journal.push(Object.assign({ t: Date.now() }, step.ev));
    if ((S.screen === "fleet") || (S.screen === "dive" && S.capsule === c.id)) render();
    armScript(c);
  }, step.wait * 1000);
}
Object.values(capsules).forEach(armScript);

/* ---------- review loop: coder ↔ reviewer rally, 3 non-converging rounds → escalate ---------- */
function renderIfVisible(c) { if (S.screen === "fleet" || (S.screen === "dive" && S.capsule === c.id)) render(); }
function pruneTrain(c, keep) {
  const train = c.journal.filter(e => ["verdict","coder_turn"].includes(e.k)).length;
  let excess = train - keep;
  if (excess <= 0) return;
  c.journal = c.journal.filter(e => {
    if (excess > 0 && (e.k === "verdict" || e.k === "coder_turn") && e.n > 0) { excess--; return false; }
    return true;
  });
}
function armReviewLoop(c) {
  const FILE = "guards.ts";
  const CORE = "scope check bypassable via nested route";
  const FIND = [
    [{ sev: "major", loc: "guards.ts:52", txt: CORE + " · still open" }],
    [{ sev: "major", loc: "guards.ts:52", txt: CORE + " · parent fixed, child route still open" }],
    [{ sev: "major", loc: "guards.ts:52", txt: CORE + " · reappears on prefetch" }],
  ];
  const FIX = ["reworked scope check", "split parent/child guard", "guarded prefetch path"];
  const MAX = 3;
  let round = 1;
  function coderPhase() {
    c.journal.push({ t: Date.now(), k: "coder_live", n: round, on: FILE, dur: 4200 });
    renderIfVisible(c);
    setTimeout(() => {
      const li = c.journal.findIndex(e => e.k === "coder_live");
      if (li >= 0) c.journal.splice(li, 1);
      c.journal.push({ t: Date.now(), k: "coder_turn", n: round, commits: 1, files: 2, fixed: FIX[(round-1) % FIX.length] });
      renderIfVisible(c);
      reviewerPhase();
    }, 4200);
  }
  function reviewerPhase() {
    c.journal.push({ t: Date.now(), k: "reviewer_live", n: round, dur: 3200 });
    renderIfVisible(c);
    setTimeout(() => {
      const li = c.journal.findIndex(e => e.k === "reviewer_live");
      if (li >= 0) c.journal.splice(li, 1);
      c.journal.push({ t: Date.now(), k: "verdict", n: round, code: 1, findings: FIND[(round-1) % FIND.length] });
      pruneTrain(c, 6);
      renderIfVisible(c);
      if (round >= MAX) {
        setTimeout(() => {
          c.journal.push({ t: Date.now(), k: "escalated",
            reason: `no-progress: ${MAX} fixes rejected, "${CORE}" still open`,
            card: { q: `The coder tried ${MAX} fixes for "${CORE}" (guards.ts:52) and the reviewer rejected each one.`,
                    ctx: "Whether nested child routes inherit the parent guard is an auth-policy call, not a mechanical fix." } });
          renderIfVisible(c);
        }, 1400);
        return;
      }
      round++;
      coderPhase();
    }, 3200);
  }
  coderPhase();
}
Object.values(capsules).forEach(c => { if (c.loop === "review") armReviewLoop(c); });

/* ---------- animation: 1s re-render for numbers/bars, 120ms for spinners/pulse ---------- */
setInterval(() => { if (S.screen !== "dossier" && S.modal !== "help") render(); }, 1000);
const SPIN = "⠋⠙⠹⠸⠼⠴⠦⠧⠇⠏";
let spinI = 0;
const reduceM = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
if (!reduceM) setInterval(() => {
  spinI = (spinI + 1) % SPIN.length;
  const ch = SPIN[spinI];
  document.querySelectorAll(".spin").forEach(el => { el.textContent = ch; });
  const o = (0.4 + 0.6 * (0.5 + 0.5 * Math.sin(Date.now() / 240))).toFixed(2);
  document.querySelectorAll(".pulse").forEach(el => { el.style.opacity = o; });
  document.querySelectorAll(".livebar").forEach(el => {
    const start = +el.dataset.start, dur = +el.dataset.dur, cells = +el.dataset.cells, cls = el.dataset.cls;
    const f = (((Date.now() - start) / dur) % 1 + 1) % 1;
    el.innerHTML = dotcontent(f, cells, cls, el.dataset.dir === "rtl");
  });
}, 120);
render();
</script>
